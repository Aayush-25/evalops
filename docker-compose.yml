version: '3.8'

services:
  db:
    image: postgres:15
    container_name: evalops_db
    environment:
      POSTGRES_DB: evalops
      POSTGRES_USER: evalops_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - evalops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalops_user -d evalops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  evalops_postgres_data:
